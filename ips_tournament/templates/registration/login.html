{% extends 'base.html' %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="color: #0056b3; margin-top: 0; border-bottom: 2px solid #0056b3; padding-bottom: 10px;">Вход</h2>
    
    <form method="post">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit" style="width: 100%; padding: 10px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px;">Войти</button>
    </form>
</div>
{% endblock %}
